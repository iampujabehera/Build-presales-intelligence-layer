function navigate(view, params = {}) {

const $ = (id) => document.getElementById(id);
const fmtCurrency = (n) => '$' + (n >= 1000000 ? (n/1000000).toFixed(1) + 'M' : (n/1000).toFixed(0) + 'K');
const fmtDate = (d) => { const dt = new Date(d); return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); };
const STAGES = ['Initial Interest','Qualified','Formal Evaluation','Shortlisted','Vendor Selected','Contract in Progress','Contract Signed'];
const stageProbability = { 'Initial Interest': 0.10, 'Qualified': 0.25, 'Formal Evaluation': 0.40, 'Shortlisted': 0.60, 'Vendor Selected': 0.80, 'Contract in Progress': 0.95, 'Contract Signed': 1.00 };
const stageColor = (stage) => ({
  'Initial Interest': 'bg-slate-100 text-slate-700 ring-slate-200',
  'Qualified': 'bg-sky-50 text-sky-700 ring-sky-200',
  'Formal Evaluation': 'bg-violet-50 text-violet-700 ring-violet-200',
  'Shortlisted': 'bg-amber-50 text-amber-700 ring-amber-200',
  'Vendor Selected': 'bg-orange-50 text-orange-700 ring-orange-200',
  'Contract in Progress': 'bg-emerald-50 text-emerald-700 ring-emerald-200',
  'Contract Signed': 'bg-green-100 text-green-800 ring-green-300'
}[stage] || 'bg-slate-100 text-slate-700 ring-slate-200');
const stageBgHex = (s) => ({ 'Initial Interest':'#94a3b8','Qualified':'#0ea5e9','Formal Evaluation':'#8b5cf6','Shortlisted':'#f59e0b','Vendor Selected':'#f97316','Contract in Progress':'#10b981','Contract Signed':'#16a34a' }[s] || '#94a3b8');
const healthColor = (n) => n >= 85 ? 'text-emerald-600' : n >= 70 ? 'text-amber-600' : 'text-rose-600';
const healthBg = (n) => n >= 85 ? 'bg-emerald-500' : n >= 70 ? 'bg-amber-500' : 'bg-rose-500';

function getFiltered() {
  return ACCOUNTS.filter(a => {
    if (state.filters.search) { const s = state.filters.search.toLowerCase(); if (!a.name.toLowerCase().includes(s) && !a.industry.toLowerCase().includes(s)) return false; }
    if (state.filters.industry !== 'all' && a.industry !== state.filters.industry) return false;
    if (state.filters.region !== 'all' && a.region !== state.filters.region) return false;
    if (state.filters.stage !== 'all' && a.stage !== state.filters.stage) return false;
    if (state.filters.dateRange !== 'all') {
      const days = parseInt(state.filters.dateRange);
      const diff = (new Date('2026-05-10') - new Date(a.lastCall)) / (1000*60*60*24);
      if (diff > days) return false;
    }
    return true;
  });
}

        </div>
        ${selectFilter('industry', ['all','Pharmaceuticals','Manufacturing','BFSI','CPG','Logistics','Conglomerate','Energy','F&B','Retail','Aviation'], 'Industry')}
        ${selectFilter('region', ['all','North America','Europe','APAC','Global'], 'Region')}
        ${selectFilter('stage', ['all', ...STAGES], 'Stage')}

function kpi(label, value, icon, color, sub) {
  const colorMap = {
    indigo: ['from-indigo-500 to-indigo-600','bg-indigo-50','text-indigo-600'],
    emerald: ['from-emerald-500 to-emerald-600','bg-emerald-50','text-emerald-600'],
    violet: ['from-violet-500 to-fuchsia-500','bg-violet-50','text-violet-600'],
    rose: ['from-rose-500 to-rose-600','bg-rose-50','text-rose-600']
  }[color];
  return `
    <div class="bg-white rounded-xl ring-card p-5 lift">
      <div class="flex items-start justify-between mb-3">
        <div class="w-9 h-9 rounded-lg ${colorMap[1]} flex items-center justify-center"><i data-lucide="${icon}" class="w-4 h-4 ${colorMap[2]}"></i></div>
        <span class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider">Live</span>
      </div>
      <div class="text-[12px] text-slate-500 font-medium">${label}</div>
      <div class="text-2xl font-bold text-slate-900 mt-0.5">${value}</div>
      <div class="text-[11px] text-slate-400 mt-1">${sub}</div>
    </div>
  `;
}

function selectFilter(key, options, label, customLabels = {}) {
  const fallbackAll = { industry: 'All industries', region: 'All regions', stage: 'All stages', dateRange: 'All time' }[key] || 'All';
  return `
    <select onchange="state.filters.${key} = this.value; renderAccountsTable();" class="bg-slate-50 border border-slate-200 hover:border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-700 outline-none focus:border-indigo-300 cursor-pointer">
      ${options.map(o => {
        const text = customLabels[o] || (o === 'all' ? fallbackAll : o);
        return `<option value="${o}" ${state.filters[key]===o?'selected':''}>${text}</option>`;
      }).join('')}
    </select>
  `;
}

function stat(label, value, color) {
  const colorMap = { emerald: 'bg-emerald-50 text-emerald-700', indigo: 'bg-indigo-50 text-indigo-700', violet: 'bg-violet-50 text-violet-700', amber: 'bg-amber-50 text-amber-700' }[color];
  return `<div class="${colorMap} rounded-lg px-3 py-2"><div class="text-lg font-bold">${value}</div><div class="text-[10px] uppercase tracking-wider font-semibold opacity-80">${label}</div></div>`;
}

function sourceBar(label, n, total, color) {
  const pct = total ? Math.round(n/total*100) : 0;
  const colorBg = { emerald: 'bg-emerald-500', indigo: 'bg-indigo-500', violet: 'bg-violet-500', amber: 'bg-amber-500' }[color];
  return `
    <div>
      <div class="flex items-center justify-between mb-1 text-[12px]"><span class="text-slate-600">${label}</span><span class="font-semibold text-slate-900">${n}</span></div>
      <div class="w-full h-1.5 bg-slate-100 rounded-full"><div class="${colorBg} h-full rounded-full" style="width:${pct}%"></div></div>
    </div>
  `;
}

function statusBadge(status) {
  const map = {
    answered: ['Answered live','#10b981','#ecfdf5'],
    kb: ['Zycus KB','#6366f1','#eef2ff'],
    rfp: ['RFP Repo','#a855f7','#faf5ff'],
    pending: ['Pending','#f59e0b','#fffbeb']
  }[status];
  return `<span style="font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 6px; background: ${map[2]}; color: ${map[1]};">${map[0]}</span>`;
}

  const a = ACCOUNTS.find(x => x.id === accountId);

  if (!doc) { toast('Document not found','info'); return; }
  let body = '';
  if (type === 'mom') body = momHTML(a, doc);
  if (type === 'solutioning') body = solHTML(a, doc);
  if (type === 'value') body = valHTML(a, doc);

  const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
  <head><meta charset='utf-8'>
  <title>${a.name} — ${type}</title>
  <style>
    body { font-family: Calibri, Arial, sans-serif; font-size: 11pt; color: #111827; max-width: 720px; margin: 30px auto; }

    tr:nth-child(even) td { background: #f8fafc; }
    ul, ol { padding-left: 22px; }
    li { margin-bottom: 4px; }
    .meta { font-size: 9pt; color: #64748b; }
    .req-id { color: #00897B; font-weight: 700; }
    .quote { font-style: italic; color: #4338ca; padding: 8px 12px; background: #eef2ff; border-left: 3px solid #6366f1; border-radius: 4px; margin: 6px 0; }
    .case-block { border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin: 10px 0; }
    .qa-block { border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; margin: 10px 0; }

  </style></head>
  <body>${body}</body></html>`;

  const blob = new Blob(['﻿', html], { type: 'application/msword' });
  const url = URL.createObjectURL(blob);

  link.href = url;
  const filename = `${a.name.replace(/[^a-z0-9]/gi,'_')}_${type === 'mom' ? 'MOM' : type === 'solutioning' ? 'Solutioning' : 'Value'}_${doc.date}.doc`;
  link.download = filename;

}

function exportSummary() {
  const accs = getFiltered();
  const rows = [['Account','Industry','Region','Stage','Deal Size','Calls','Last Call','Health']];
  accs.forEach(a => rows.push([a.name, a.industry, a.region, a.stage, a.dealSize, a.callsCount, a.lastCall, a.healthScore]));
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `presales_pipeline_${new Date().toISOString().slice(0,10)}.csv`;
  link.click();
  toast('Pipeline exported as CSV','success');
}

/* ==================== VIEW: OPPORTUNITY TRACKER ==================== */

function getFilteredOpps() {
  return OPPORTUNITIES.filter(o => {
    if (state.oppFilters.search) {
      const s = state.oppFilters.search.toLowerCase();
      const a = ACCOUNTS.find(x => x.id === o.accountId);
      const haystack = `${a.name} ${o.module} ${o.sfId} ${o.id} ${o.owner} ${o.presales}`.toLowerCase();
      if (!haystack.includes(s)) return false;
    }
    if (state.oppFilters.stage !== 'all' && o.stage !== state.oppFilters.stage) return false;
    if (state.oppFilters.type !== 'all' && o.type !== state.oppFilters.type) return false;
    if (state.oppFilters.owner !== 'all' && o.owner !== state.oppFilters.owner) return false;
    return true;
  });
}

  return `

function avgDaysToClose(opps) {
  const open = opps.filter(o => o.stage !== 'Contract Signed');
  if (!open.length) return 0;
  const today = new Date('2026-05-10');
  const days = open.reduce((s,o) => s + Math.max(0, Math.round((new Date(o.closeDate) - today) / (1000*60*60*24))), 0);
  return Math.round(days / open.length);
}

}

function pullFromSF(oppId) {
  const newId = ($('new-sf-id')?.value || '').trim();
  if (!newId) { toast('Please enter a Salesforce Opportunity ID', 'info'); return; }

  $('modal-root').innerHTML = `
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4 fade-in">
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-7 slide-up text-center">

          <i data-lucide="refresh-cw" class="w-6 h-6 text-white animate-spin"></i>
        </div>
        <h3 class="text-lg font-bold text-slate-900">Pulling from Salesforce…</h3>
        <p class="text-[13px] text-slate-500 mt-1.5">Fetching fields from <span class="font-mono">${newId}</span></p>
        <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden relative mt-5">
          <div class="absolute inset-y-0 bg-gradient-to-r from-indigo-500 to-violet-500 rounded-full indeterminate"></div>
        </div>
      </div>
    </div>
  `;
  lucide.createIcons();

  setTimeout(() => {
    const o = OPPORTUNITIES.find(x => x.id === oppId);
    if (o) o.sfId = newId;
    closeModal();
    render();
    toast(`Synced from ${newId}`, 'success');
  }, 1600);
}

function syncSF() {
  toast('Syncing all opportunities from Salesforce…', 'info');
  setTimeout(() => { render(); toast(`Synced ${OPPORTUNITIES.length} opportunities · 0 conflicts`, 'success'); }, 1400);
}

function exportOpps() {
  const rows = [['Account','Module','Opportunity ID (SF)','Internal Ref','Stage','Type','Amount','Services','Total','Owner','Presales','Last Connect','Close Date','SF URL']];
  OPPORTUNITIES.forEach(o => {
    const a = ACCOUNTS.find(x => x.id === o.accountId);
    rows.push([a.name, o.module, o.sfId, o.id, o.stage, o.type, o.amount, o.servicesAmount, o.amount + o.servicesAmount, o.owner, o.presales, o.lastConnect, o.closeDate, sfUrl(o.sfId)]);
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `opportunity_pipeline_${new Date().toISOString().slice(0,10)}.csv`;
  link.click();
  toast('Pipeline exported as CSV','success');
}

              <p class="text-[11px] text-slate-500 mt-0.5">Last 90 days · sourced from public-domain news + company press</p>
            </div>
            <div class="flex flex-wrap items-center gap-1.5">
              ${categories.map(c => `
                <button onclick="state.intelCategoryFilter='${c}';render();" class="text-[11px] font-medium px-2.5 py-1 rounded-md transition ${filter===c ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}">${c==='all'?'All':c}</button>
              `).join('')}
            </div>
          </div>
          ${news.length === 0 ? `<div class="p-12 text-center text-[13px] text-slate-500"><i data-lucide="search-x" class="w-8 h-8 inline text-slate-300 mb-2"></i><div>No items in this category.</div></div>` : `
          <ul class="divide-y divide-slate-100">
            ${news.map(n => {
              const cat = newsCategoryColor(n.category);
              return `
                <li class="p-5 hover:bg-slate-50/40 transition relative">
                  <div class="absolute left-0 top-5 bottom-5 w-1 rounded-r" style="background:${cat.dot}"></div>
                  <div class="pl-3">
                    <div class="flex items-center gap-2 mb-1.5 flex-wrap">
                      <span class="inline-flex items-center gap-1 text-[10px] font-semibold px-2 py-0.5 rounded-md ring-1 ${cat.ring}"><i data-lucide="${cat.icon}" class="w-2.5 h-2.5"></i>${n.category}</span>
                      <span class="text-[11px] text-slate-500">${fmtDate(n.date)}</span>
                      <span class="text-[11px] text-slate-300">·</span>
                      <span class="text-[11px] text-slate-600 font-medium">${n.source}</span>
                      ${isFresh(n.date) ? `<span class="text-[9px] uppercase tracking-wider font-bold px-1.5 py-0.5 rounded bg-rose-100 text-rose-700">New</span>` : ''}
                    </div>
                    <a href="${n.url}" target="_blank" rel="noopener" class="block">
                      <h4 class="font-semibold text-slate-900 text-[14px] leading-snug hover:text-indigo-700 transition">${n.headline}</h4>
                    </a>
                    <p class="text-[12.5px] text-slate-600 mt-1.5 leading-relaxed">${n.snippet}</p>
                    <a href="${n.url}" target="_blank" rel="noopener" class="inline-flex items-center gap-1 mt-2.5 text-[11.5px] font-semibold text-indigo-600 hover:text-indigo-800">
                      Read on ${n.source} <i data-lucide="external-link" class="w-3 h-3"></i>
                    </a>
                  </div>
                </li>
              `;
            }).join('')}
          </ul>
          `}
        </div>
      </div>
    </div>
  `;
}

function refreshIntel(accountId) {
  toast(`Refreshing public-source feeds for ${ACCOUNTS.find(a=>a.id===accountId).name}…`, 'info');
  setTimeout(() => {
    if (ACCOUNT_INTEL[accountId]) ACCOUNT_INTEL[accountId].updated = '2026-05-10';
    render();
    toast('Intel refreshed · 0 new items since last sync', 'success');
  }, 1300);
}

/* ==================== RENDER ==================== */

function render() {
  const root = $('view-root');
  if (state.view === 'docagent' || state.view === 'dashboard' || state.view === 'accounts') root.innerHTML = viewDashboard();
  else if (state.view === 'account-detail') root.innerHTML = viewAccountDetail();
  else if (state.view === 'opportunity') root.innerHTML = viewOpportunities();
  else if (state.view === 'account-intel') root.innerHTML = viewAccountIntel();

  document.querySelectorAll('[data-nav]').forEach(b => b.classList.remove('nav-active'));
  let navKey;
  if (state.view === 'opportunity' || state.view === 'account-intel') navKey = 'opportunity';
  else if (state.view === 'account-detail' || state.view === 'dashboard' || state.view === 'accounts') navKey = 'docagent';
  else navKey = state.view;
  const navBtn = document.querySelector(`[data-nav="${navKey}"]`);
  if (navBtn) navBtn.classList.add('nav-active');

  lucide.createIcons();
}

/* ==================== INIT ==================== */

window.addEventListener('DOMContentLoaded', () => {
  render();
  // wire global search — applies to whichever view is active
  const gs = $('globalSearch');
  if (gs) gs.addEventListener('input', e => {
    const v = e.target.value;
    if (state.view === 'opportunity') {
      state.oppFilters.search = v;
      renderOppTable();
    } else {
      state.filters.search = v;
      if (state.view === 'docagent' || state.view === 'dashboard' || state.view === 'accounts') renderAccountsTable();
    }
  });
});
</script>
</body>
</html>
